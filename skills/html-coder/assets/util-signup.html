<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create a new account to get started with our platform. Free signup with email or social login.">
  <meta name="robots" content="noindex, nofollow">
  <title>Create Your Account | Sign Up</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>
  
  <main id="main" class="auth-page">
    <div class="auth-container">
      <div class="auth-branding">
        <a href="/" class="logo-link">
          <img src="logo.svg" alt="Company Logo" width="150" height="50" loading="eager">
        </a>
      </div>
      
      <div class="auth-card">
        <h1>Create your account</h1>
        <p class="auth-subtitle">Get started with your free account</p>
        
        <div class="social-auth-buttons">
          <button type="button" class="btn btn-outline btn-social" onclick="signupWithGoogle()">
            <img src="google-icon.svg" alt="" width="20" height="20" loading="lazy">
            <span>Continue with Google</span>
          </button>
          
          <button type="button" class="btn btn-outline btn-social" onclick="signupWithGithub()">
            <img src="github-icon.svg" alt="" width="20" height="20" loading="lazy">
            <span>Continue with GitHub</span>
          </button>
        </div>
        
        <div class="divider">
          <span>Or sign up with email</span>
        </div>
        
        <form class="auth-form" action="/signup" method="POST">
          <div class="form-row">
            <div class="form-group">
              <label for="first-name">First Name</label>
              <input 
                type="text" 
                id="first-name" 
                name="first_name" 
                placeholder="John"
                required 
                autocomplete="given-name"
                autofocus>
            </div>
            
            <div class="form-group">
              <label for="last-name">Last Name</label>
              <input 
                type="text" 
                id="last-name" 
                name="last_name" 
                placeholder="Doe"
                required 
                autocomplete="family-name">
            </div>
          </div>
          
          <div class="form-group">
            <label for="email">Email Address</label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              placeholder="you@example.com"
              required 
              autocomplete="email">
          </div>
          
          <div class="form-group">
            <label for="password">Password</label>
            <input 
              type="password" 
              id="password" 
              name="password" 
              placeholder="Create a strong password"
              required 
              autocomplete="new-password"
              minlength="8"
              aria-describedby="password-requirements">
            <small id="password-requirements" class="form-help-text">
              Minimum 8 characters, including uppercase, lowercase, and number
            </small>
          </div>
          
          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <input 
              type="password" 
              id="confirm-password" 
              name="confirm_password" 
              placeholder="Re-enter your password"
              required 
              autocomplete="new-password"
              minlength="8">
          </div>
          
          <div class="form-group-checkbox">
            <input type="checkbox" id="terms" name="terms" value="accepted" required>
            <label for="terms">
              I agree to the <a href="/terms" target="_blank">Terms of Service</a> and <a href="/privacy" target="_blank">Privacy Policy</a>
            </label>
          </div>
          
          <div class="form-group-checkbox">
            <input type="checkbox" id="newsletter" name="newsletter" value="yes">
            <label for="newsletter">
              Send me product updates and tips (optional)
            </label>
          </div>
          
          <button type="submit" class="btn btn-primary btn-large btn-full-width">Create Account</button>
        </form>
        
        <p class="auth-footer-text">
          Already have an account? 
          <a href="/login">Sign in</a>
        </p>
      </div>
      
      <footer class="auth-footer">
        <nav aria-label="Legal">
          <a href="/privacy">Privacy Policy</a>
          <a href="/terms">Terms of Service</a>
          <a href="/help">Help Center</a>
        </nav>
      </footer>
    </div>
  </main>
  
  <script src="auth.js" defer></script>
</body>
</html>
